<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BentleyPlayz Pizza</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: #fff6f2;
        color: #222;
    }

    header {
        background: linear-gradient(135deg, #e53935, #b71c1c);
        color: white;
        padding: 18px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        font-size: 22px;
    }

    .hero {
        height: 260px;
        background: url('https://images.unsplash.com/photo-1601924928376-3c6c3a0d2c6a') center/cover;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        color: white;
        text-align: center;
    }

    .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.55);
    }

    .hero h2 {
        position: relative;
        font-size: 38px;
        z-index: 1;
    }

    .menu {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        padding: 40px;
        max-width: 1000px;
        margin: auto;
    }

    .card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }

    .card img {
        width: 100%;
        height: 140px;
        object-fit: cover;
    }

    .card-content {
        padding: 12px;
    }

    .price {
        color: #e53935;
        font-weight: bold;
        margin: 5px 0;
    }

    button {
        background: #e53935;
        color: white;
        border: none;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
    }

    button:hover {
        background: #b71c1c;
    }

    .cart {
        position: fixed;
        right: 20px;
        top: 80px;
        width: 260px;
        background: white;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        border-radius: 10px;
        padding: 15px;
    }

    .cart h3 {
        margin-bottom: 10px;
    }

    .cart-item {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin: 5px 0;
    }

    .total {
        margin-top: 10px;
        font-weight: bold;
    }

    .checkout {
        margin-top: 10px;
        background: black;
    }

    .remove {
        color: red;
        cursor: pointer;
        font-size: 12px;
    }

    .popup {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: none;
        align-items: center;
        justify-content: center;
    }

    .popup-content {
        background: white;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        width: 300px;
    }

    .popup-content h2 {
        margin-bottom: 10px;
        color: #e53935;
    }
</style>
</head>

<body>

<header>
    <h1>BentleyPlayz Pizza</h1>
    <div>📞 6075922261 (US Only Call)</div>
</header>

<section class="hero">
    <h2>Fresh Pizza. Fast Orders.</h2>
</section>

<div class="menu">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1601924928376-3c6c3a0d2c6a">
        <div class="card-content">
            <h3>Cheese Pizza</h3>
            <p class="price">$9.99</p>
            <button onclick="addItem('Cheese Pizza', 9.99)">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1604382354936-07c5d9983bd3">
        <div class="card-content">
            <h3>Pepperoni</h3>
            <p class="price">$11.99</p>
            <button onclick="addItem('Pepperoni', 11.99)">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1605475126235-6c1b7a1a7b35">
        <div class="card-content">
            <h3>Meat Lovers</h3>
            <p class="price">$13.99</p>
            <button onclick="addItem('Meat Lovers', 13.99)">Add to Cart</button>
        </div>
    </div>

</div>

<div class="cart">
    <h3>Your Cart</h3>
    <div id="cart"></div>
    <div class="total">Total: $<span id="total">0.00</span></div>
    <button class="checkout" onclick="checkout()">Buy Now</button>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2>Sorry!</h2>
        <p>The store is currently down.</p>
        <p>Please call us:</p>
        <b>6075922261 (US Only Call)</b>
        <br><br>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
let cart = [];

function addItem(name, price) {
    cart.push({name, price});
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function renderCart() {
    let cartDiv = document.getElementById("cart");
    cartDiv.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;

        cartDiv.innerHTML += `
            <div class="cart-item">
                ${item.name} - $${item.price.toFixed(2)}
                <span class="remove" onclick="removeItem(${index})">X</span>
            </div>
        `;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

function checkout() {
    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
    cart = [];
    renderCart();
}
</script>

</body>
</html>
