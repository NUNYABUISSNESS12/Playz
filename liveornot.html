<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph -->

    <meta property="og:description" content="Check if Bentley Playz is live right now and watch instantly!">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Bentley Playz - Live Status">
    <meta name="twitter:description" content="Check if Bentley Playz is live right now and watch instantly!">
    <meta name="twitter:image" content="https://github.com/NUNYABUISSNESS12/Playz/blob/3ebb278e8ed3288c945e0899fd28ee6ef535c683/image.000000.jpg?raw=1">
    <meta name="twitter:url" content="https://bentleyplayz.com/liveornot">

    <title>Bentley Playz - Live Status</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            margin-bottom: 10px;
        }

        .live {
            color: green;
            font-size: 26px;
            font-weight: bold;
        }

        .offline {
            color: red;
            font-size: 26px;
            font-weight: bold;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        iframe {
            margin-top: 25px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<h1>Bentley Playz - Live Status</h1>
<p id="status">Checking...</p>

<button onclick="checkLive()">🔄 Refresh</button>

<div id="videoContainer"></div>

<script>
const API_KEY = "AIzaSyCe2GqXf79Vu3idT2zW24LGI2MF7IdkJYc";
const CHANNEL_ID = "UCScF9sMw5r6LPjyHb03mVOg";

async function checkLive() {
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    const status = document.getElementById("status");
    const videoContainer = document.getElementById("videoContainer");

    if (data.items && data.items.length > 0) {
      const videoId = data.items[0].id.videoId;

      status.textContent = "🔴 Bentley Playz is LIVE!";
      status.className = "live";

      videoContainer.innerHTML = `
        <iframe width="560" height="315"
        src="https://www.youtube.com/embed/${videoId}"
        frameborder="0"
        allowfullscreen>
        </iframe>
      `;
    } else {
      status.textContent = "⚫ Bentley Playz is Offline";
      status.className = "offline";
      videoContainer.innerHTML = "";
    }
  } catch (err) {
    document.getElementById("status").textContent = "Error checking status";
  }
}

// Run on load
checkLive();

// Auto refresh every 30 sec
setInterval(checkLive, 30000);
</script>

</body>
</html>
